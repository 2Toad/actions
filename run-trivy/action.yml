# -----------------------------------------------------------------------------
# Run Trivy SCA Scan
#
# Description:
#   This GitHub Action runs a Trivy Software Composition Analysis (SCA) scan on
#   the specified path in the repository. It uses Trivy to scan for vulnerabilities,
#   misconfigurations, secrets, and license issues in the codebase. This action
#   is designed to be flexible, allowing for the inclusion or exclusion of development
#   dependencies and specific directories or files from the scan.
#
# Inputs:
#   - path (required): The path to scan. Default is ".".
#   - severity (required): The severity levels to report.
#     Defaults to all possible values "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL".
#   - skip_dirs (optional): A comma-separated list of directories not to scan.
#   - skip_files (optional): A comma-separated list of files not to scan.
#   - include_dev_dependencies (optional): A boolean value to determine whether
#     development dependencies should be included in the scan. Default is "true".
#   - cache_db (optional): When true, the Trivy vulnerability database is cached
#     between workflow runs using GitHub Actions cache. If a database fetch fails,
#     the workflow falls back to the cached database. Default is "true".
#   - ignored_licenses (optional): A comma-separated list of licenses to ignore
#     (e.g., "MPL-2.0,LGPL-2.1"). Supports compound names (e.g., "Apache-2.0 AND LGPL-3.0-or-later").
#
# Requirements
#   - Trivy must be installed (e.g., 2Toad/actions/install-trivy)
#   - Code must be checked-out
#   - For license scanning to work, node_modules folder must be present
#
# Usage Example:
#   jobs:
#     sca:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Checkout code
#           uses: actions/checkout@v6
#
#         - name: Install Trivy
#           uses: 2Toad/actions/install-trivy@v2
#
#         - name: Run Trivy SCA Scan
#           uses: 2Toad/actions/run-trivy@v2
#           with:
#             path: "./src"
#             severity: "MEDIUM,HIGH,CRITICAL"
#             skip_dirs: "node_modules,dist"
#             skip_files: "Dockerfile"
#             include_dev_dependencies: "false"
#
# -----------------------------------------------------------------------------

name: "Run Trivy SCA Scan"
description: "Run Trivy Software Composition Analysis scan on the repository"
inputs:
  path:
    description: "The path to scan"
    required: true
    default: "."
  severity:
    description: "Severity levels to report (e.g., HIGH,CRITICAL)"
    required: true
    default: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  skip_dirs:
    description: "A comma-separated list of directories not to scan"
    required: false
    default: ""
  skip_files:
    description: "A comma-separated list of files not to scan"
    required: false
    default: ""
  include_dev_dependencies:
    description: "Whether to include development dependencies in the scan"
    required: false
    default: "true"
  fail_on_db_error:
    description: "When true the action will fail if Trivy cannot download the vulnerability DB"
    required: false
    default: "true"
  cache_db:
    description: "When true, caches the Trivy vulnerability DB between runs and falls back to the cache if a fetch fails"
    required: false
    default: "true"
  ignored_licenses:
    description: "Comma-separated list of licenses to ignore (e.g., MPL-2.0,LGPL-2.1)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Restore Trivy DB cache
      if: inputs.cache_db == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/trivy
        key: trivy-cache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          trivy-cache-${{ runner.os }}-

    - name: Run Trivy SCA scan
      shell: bash
      env:
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_SKIP_DIRS: ${{ inputs.skip_dirs }}
        INPUT_SKIP_FILES: ${{ inputs.skip_files }}
        INPUT_INCLUDE_DEV_DEPS: ${{ inputs.include_dev_dependencies }}
        INPUT_IGNORED_LICENSES: ${{ inputs.ignored_licenses }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FAIL_ON_DB_ERROR: ${{ inputs.fail_on_db_error }}
        INPUT_CACHE_DB: ${{ inputs.cache_db }}
      run: |
        # Build --ignored-licenses flags (one per entry to support compound names with spaces)
        license_flags=()
        if [ -n "$INPUT_IGNORED_LICENSES" ]; then
          IFS=',' read -ra licenses <<< "$INPUT_IGNORED_LICENSES"
          for license in "${licenses[@]}"; do
            license_flags+=("--ignored-licenses" "$license")
          done
        fi

        # Run Trivy scan with optional extra flags; captures output and exit code
        run_trivy_scan() {
          local extra_flags=("$@")
          set +e
          trivy_output=$(trivy fs --scanners vuln,misconfig,secret,license \
            --severity "$INPUT_SEVERITY" \
            ${INPUT_SKIP_DIRS:+--skip-dirs "$INPUT_SKIP_DIRS"} \
            ${INPUT_SKIP_FILES:+--skip-files "$INPUT_SKIP_FILES"} \
            $([ "$INPUT_INCLUDE_DEV_DEPS" = "true" ] && echo "--include-dev-deps") \
            "${license_flags[@]}" \
            --ignore-unfixed \
            --no-progress \
            "${extra_flags[@]}" \
            "$INPUT_PATH" \
            --exit-code 1 2>&1)
          exit_code=$?
          set -e

          # Print the Trivy output to the console (disable workflow commands to prevent log injection)
          stop_token=$(uuidgen)
          echo "::stop-commands::$stop_token"
          echo "$trivy_output"
          echo "::$stop_token::"
        }

        # Primary scan (downloads fresh DB)
        run_trivy_scan

        # Check the exit code and handle the specific error
        if [ $exit_code -ne 0 ]; then
          if echo "$trivy_output" | grep -q -i 'failed to download vulnerability DB'; then
            # Attempt fallback to cached DB if caching is enabled
            if [ "$INPUT_CACHE_DB" = "true" ] && [ -d "$HOME/.cache/trivy/db" ] && [ -n "$(ls -A "$HOME/.cache/trivy/db" 2>/dev/null)" ]; then
              db_date=$(stat -c '%Y' "$HOME/.cache/trivy/db/metadata.json" 2>/dev/null || stat -f '%m' "$HOME/.cache/trivy/db/metadata.json" 2>/dev/null)
              if [ -n "$db_date" ]; then
                db_date_fmt=$(date -d "@$db_date" '+%-m/%-d/%Y' 2>/dev/null || date -r "$db_date" '+%-m/%-d/%Y' 2>/dev/null)
              fi

              echo ""
              if [ -n "$db_date_fmt" ]; then
                echo "WARNING: Trivy failed to download vulnerability DB. Falling back to cached database from ${db_date_fmt}."
              else
                echo "WARNING: Trivy failed to download vulnerability DB. Falling back to cached database."
              fi
              echo ""

              run_trivy_scan --skip-db-update

              if [ $exit_code -ne 0 ]; then
                if echo "$trivy_output" | grep -q -i 'failed to download vulnerability DB'; then
                  if [ "$INPUT_FAIL_ON_DB_ERROR" = "true" ]; then
                    exit 1
                  else
                    echo "WARNING: Trivy failed to scan with cached DB. Unable to scan for vulnerabilities."
                    exit 0
                  fi
                else
                  exit $exit_code
                fi
              fi
            elif [ "$INPUT_FAIL_ON_DB_ERROR" = "true" ]; then
              exit 1
            else
              echo "WARNING: Trivy failed to download vulnerability DB. Unable to scan for vulnerabilities."
              exit 0
            fi
          else
            exit $exit_code
          fi
        fi
