# -----------------------------------------------------------------------------
# Install Trivy
#
# Description:
#   This GitHub Action installs the Trivy Software Composition Analysis (SCA) tool
#   on the runner environment. Trivy is a comprehensive vulnerability scanner that 
#   is used to detect security issues in container images, file systems, and 
#   software dependencies.
#
# Usage Example:
#   jobs:
#     sca:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Checkout code
#           uses: actions/checkout@v6
#
#         - name: Install Trivy
#           uses: 2Toad/actions/install-trivy@v1
#           with:
#             version: "0.69.3"  # optional, defaults to 0.69.3
#
#         - name: Run Trivy SCA Scan
#           uses: 2Toad/actions/run-trivy@v1
#           with:
#             path: "./src"
#             severity: "MEDIUM,HIGH,CRITICAL"
#
# -----------------------------------------------------------------------------

name: "Install Trivy"
description: "Install Trivy SCA tool"
inputs:
  version:
    description: "The version of Trivy to install (e.g., 0.69.3)"
    required: false
    default: "0.69.3"
runs:
  using: "composite"
  steps:
    - name: Install Trivy
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        sudo mkdir -p /etc/apt/keyrings
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /etc/apt/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install "trivy=$INPUT_VERSION" -y
